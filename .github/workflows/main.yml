name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Yeh line GitHub ko release create karne ki ijazat deti hai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java aur Flutter Setup Steps (Pehle wale)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # APK Build Karna
      - name: Build APK
        run: flutter build apk --release # Release build banayein

      # TOKEN TESTING STEP: Built-in GITHUB_TOKEN use kar ke APK ko release mein upload karna
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }} # Har push par naya version auto banega
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }} # Yeh hai aapka built-in token!
